<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2203.fyi // k-NET</title>
<meta name="description" content="k-NET node — tools, projects, and works in progress.">

<!--
  ============================================================
  2203.fyi -- k-NET landing page
  Plain HTML/CSS/vanilla JS, single file, no external dependencies.
  Structure:
    1. .flag                -- diagonal banner + wordmark (with node
                                status LEDs) + subtitle + prev/next
                                arrows, built at wordmark scale. This
                                is the reusable per-page "frame" --
                                same block goes on every sibling page,
                                just swap the accent color + wordmark.
    1a. .mesh-banner         -- Mesh That Divide promo button, pinned
                                 in the white margin just left of the
                                 flag, vertically centered on it, same
                                 as 1b. Links to https://mtd.2203.fyi/.
                                 Hover state is linked with the
                                 adjacent (prev) arrow, both ways.
                                 Cream background preserved as-is, no
                                 whitening, unlike 1b.
    1b. .margin-banner       -- Just Greens promo button, pinned in the
                                 white margin just right of the flag,
                                 vertically centered on it. Links to
                                 https://greens.2203.fyi/. Hover state
                                 is linked with the adjacent (next)
                                 arrow, both ways.
    2. .statusbar             -- bracket nav (TOOLS/SERVICE/SOON). No
                                 longer anchor-scroll links -- each is a
                                 button that flies out a side-menu panel
                                 in the left margin instead (2b). Only
                                 one panel open at a time; clicking the
                                 open one's button closes it again.
    2b. .side-menu            -- one per nav button (#menu-tools,
                                 #menu-service, #menu-soon), hidden by
                                 default, positioned in the left margin,
                                 top edge pinned to the flag's bottom
                                 edge so it grows downward from the
                                 flag's bottom-left corner into the open
                                 margin space below. Content used to
                                 live inline as <section>s; that's gone
                                 now, freeing up the frame's middle for
                                 a future landing-page draft.
    3. .page-strip            -- horizontal scrub strip of every page on
                                 the site, lives INSIDE the frame as its
                                 footer -- not trailing below it on white
    4. main.center-frame     -- the single 640px dark panel wrapping all
                                 of the above, floating on a plain white
                                 page, touching the browser's top/bottom
                                 edge. No content trails below it -- the
                                 page-strip (3) is its last child. Side
                                 margins left/right of it stay blank
                                 except for the mesh-banner (1a),
                                 margin-banner (1b), and whichever
                                 side-menu (2b) is open.
    5. <script>              -- PAGES config + arrow nav + strip
                                 rendering + side-menu toggle logic

  Swap the placeholder <li> items and hrefs for real links.
  To add/remove/reorder sibling pages, edit the PAGES array near the
  bottom -- everything else (arrows, strip) derives from it.
  ============================================================
-->

<style>
  :root {
    --bg:        #050607;
    --panel:     #0b0d10;
    --blue:      #1c3fd9;
    --blue-deep: #0a154d;
    --ink:       #e8e8e8;
    --white:     #ffffff;
    --dim:       #6b7280;
    --glow:      #4fd1ff;
    --slate:     #708090;
    --rule:      #22262c;
    --mono: 'Courier New', ui-monospace, 'SFMono-Regular', Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--white);
    color: var(--ink);
    font-family: var(--mono);
  }

  body {
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .page-shell {
    width: 100%;
    max-width: 640px;
  }

  /* ---------- scanline overlay, whole page, very subtle ---------- */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 999;
  }

  /* ---------- 1. flag banner (signature element + per-page "frame") ---------- */
  .flag {
    position: relative;
    height: 200px;
    background: linear-gradient(135deg, #000 49.6%, var(--flag-accent, var(--blue)) 50.4%);
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 64px;
    overflow: hidden;
  }

  .flag::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 0%, rgba(79,209,255,0.087) 50%, transparent 100%);
    background-size: 100% 300%;
    animation: sweep 6s linear infinite;
  }

  @keyframes sweep {
    0%   { background-position: 0 0%; }
    100% { background-position: 0 300%; }
  }

  .flag h1 {
    position: relative;
    z-index: 2;
    margin: 0;
    text-align: center;
    color: var(--white);
    font-size: clamp(36px, 9.5vw, 54px);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-shadow: 0 0 12px rgba(255,255,255,0.35);
    /* room is reserved by .flag's own padding, not by flex-basis --
       so bigger emblems (images, wider marks) on sibling pages get the
       full available width instead of being squeezed by arrow siblings */
  }

  /* The k-NET wordmark itself is a real link to 86.2203.fyi, but a
     quiet one -- no color shift, no underline, at rest or on hover.
     The only "tell" is the native title tooltip on hover. Everything
     else (size, weight, spacing, glow) is just inherited from h1. */
  .wordmark-link,
  .wordmark-link:hover,
  .wordmark-link:visited,
  .wordmark-link:focus-visible,
  .wordmark-link:active {
    color: inherit;
    text-decoration: none;
  }

  /* mesh node status LEDs -- placeholder pair, not wired to anything
     yet. Red is on by default (dumb default -- no script means
     "unknown/not confirmed live", flagged red until real telemetry
     exists). Add/remove .led--on to flip which one is lit. */
  .node-leds {
    display: inline-flex;
    gap: 5px;
    margin-right: 12px;
    vertical-align: middle;
    transform: translateY(-3px);
  }
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .led--red   { background: #5a1f1f; }
  .led--green { background: #1f4a30; }
  .led--red.led--on   { background: #ff4d4d; box-shadow: 0 0 6px 2px rgba(255,77,77,0.65); }
  .led--green.led--on { background: #3ddc84; box-shadow: 0 0 6px 2px rgba(61,220,132,0.65); }

  /* Subtitle sits independent of the h1's own centering -- absolutely
     positioned halfway between the (vertically centered) title and
     the bottom edge of the flag box. */
  .flag-subtitle {
    position: absolute;
    z-index: 2;
    left: 50%;
    top: calc(75% + 20px);
    transform: translate(-50%, -50%);
    margin: 0;
    white-space: nowrap;
    text-align: center;
    color: var(--white);
    font-weight: 700;
    font-style: normal;
    font-size: 15px;
    letter-spacing: 0.03em;
    text-shadow: 0 0 8px rgba(255,255,255,0.25);
  }

  .flag-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    background: none;
    border: none;
    padding: 8px;
    color: var(--slate);
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(18px, 4.5vw, 28px);
    letter-spacing: 0.05em;
    text-shadow: 0 0 12px rgba(112,128,144,0.45);
    cursor: pointer;
    line-height: 1;
  }
  .flag-arrow--prev { left: 8px; }
  .flag-arrow--next { right: 8px; }
  .flag-arrow:hover:not(:disabled),
  .flag-arrow:focus-visible:not(:disabled),
  /* Just Greens sits immediately right of the flag, so the "next"
     arrow is its adjacent control -- hovering the Just Greens button
     lights up this arrow too, as if you were hovering it directly.
     Mesh That Divide sits immediately left, paired the same way with
     the "prev" arrow. */
  .flag-wrap:has(.margin-banner:hover) .flag-arrow--next:not(:disabled),
  .flag-wrap:has(.margin-banner:focus-visible) .flag-arrow--next:not(:disabled),
  .flag-wrap:has(.mesh-banner:hover) .flag-arrow--prev:not(:disabled),
  .flag-wrap:has(.mesh-banner:focus-visible) .flag-arrow--prev:not(:disabled) {
    color: var(--glow);
    text-shadow: 0 0 16px rgba(79,209,255,0.6);
  }
  .flag-arrow:disabled {
    color: rgba(112,128,144,0.3);
    text-shadow: none;
    cursor: default;
  }

  .cursor {
    display: inline-block;
    width: 0.5em;
    margin-left: 2px;
    background: var(--white);
    animation: blink 1.1s steps(1) infinite;
  }

  @keyframes blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ---------- 1b. flag-wrap: positioning context for the margin banner ---------- */
  .flag-wrap {
    position: relative;
  }

  /* Just Greens margin banner -- sits in the margin just right of the
     flag, vertically centered on the flag (which is also where the
     prev/next arrows sit, since they use the same top:50% centering).
     Real link -> https://greens.2203.fyi/. Zero internal padding: the
     image is cropped tight to the circle artwork, so the border
     touches the graphics directly with no gap. Hover state is linked
     both ways with the adjacent (next) arrow -- see the :has() rules
     on .flag-arrow and here. */
  .margin-banner {
    position: absolute;
    left: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%);
    width: 214px;
    z-index: 3;
    display: block;
    border: 2px solid var(--rule);
    box-shadow: 0 3px 10px rgba(0,0,0,0.22);
    padding: 0;
    line-height: 0;
    text-decoration: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .margin-banner:hover,
  .margin-banner:focus-visible,
  /* the reverse of the arrow rule above: hovering the adjacent next
     arrow makes the Just Greens button react as if hovered directly */
  .flag-wrap:has(.flag-arrow--next:hover) .margin-banner,
  .flag-wrap:has(.flag-arrow--next:focus-visible) .margin-banner {
    border-color: var(--glow);
    box-shadow: 0 4px 16px rgba(79,209,255,0.45);
    transform: translateY(calc(-50% - 2px));
  }
  .margin-banner img {
    display: block;
    width: 100%;
    height: auto;
    animation: greensFade 7s ease-in-out infinite;
  }
  .margin-banner-label {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    color: #000;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 24px;
    line-height: 1;
    white-space: nowrap;
    letter-spacing: -0.02em;
    text-align: center;
    text-shadow: 0 0 5px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.7);
  }

  @keyframes greensFade {
    0%, 100% { opacity: 0.13; }
    50%      { opacity: 0.66; }
  }

  /* Mesh That Divide banner button -- the left-margin twin to
     .margin-banner. Same width, same border/shadow/hover treatment,
     same reciprocal hover-link, this time with the adjacent PREV
     arrow (Mesh sits to k-NET's left in the PAGES order). Deliberately
     top-anchored rather than vertically centered like Just Greens --
     that leaves the flag's lower-left margin free for the side-menus
     (which are bottom-anchored, see .side-menu below) instead of the
     two competing for the same vertical space. No fade animation on
     the image, unlike Just Greens -- this one carries a tagline that
     needs to stay legible, not pulse in and out. */
  .mesh-banner {
    position: absolute;
    right: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%);
    width: 214px;
    z-index: 3;
    display: block;
    border: 2px solid var(--rule);
    box-shadow: 0 3px 10px rgba(0,0,0,0.22);
    padding: 0;
    line-height: 0;
    text-decoration: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .mesh-banner:hover,
  .mesh-banner:focus-visible,
  .flag-wrap:has(.flag-arrow--prev:hover) .mesh-banner,
  .flag-wrap:has(.flag-arrow--prev:focus-visible) .mesh-banner {
    border-color: var(--glow);
    box-shadow: 0 4px 16px rgba(79,209,255,0.45);
    transform: translateY(calc(-50% - 2px));
  }
  .mesh-banner img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ---------- 2. bracket nav bar + left-margin side menus ---------- */
  .statusbar {
    margin-top: 18px;
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* ---------- 3. bracket nav ---------- */
  nav.menu {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 14px;
  }
  nav.menu button.menu-toggle {
    color: var(--ink);
    background: none;
    text-decoration: none;
    border: 1px solid var(--rule);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  /* is-active first, :hover after -- so a hovered button always shows
     the solid fill, but an open (not currently hovered) menu's button
     settles into the quieter outline look. */
  nav.menu button.menu-toggle.is-active {
    background: none;
    border-color: var(--glow);
    color: var(--glow);
  }
  nav.menu button.menu-toggle:hover,
  nav.menu button.menu-toggle:focus-visible {
    color: var(--bg);
    background: var(--glow);
    border-color: var(--glow);
  }

  /* Side menus -- one per nav button, flown out into the left margin
     instead of jumping/scrolling to an inline section. Only one is
     ever visible at a time (script toggles the `hidden` attribute).
     Lives inside .flag-wrap, top edge pinned flush to the flag's own
     bottom edge -- so it grows downward from the flag's bottom-left
     corner, into the open margin space below, rather than upward into
     the flag's own vertical span. */
  .side-menu {
    position: absolute;
    right: 100%;
    top: 100%;
    width: 260px;
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 14px;
    z-index: 3;
  }
  .side-menu-header {
    display: inline-block;
    margin: 0 0 12px;
    border: 2px solid var(--glow);
    color: var(--glow);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    padding: 4px 10px;
  }
  .side-menu ul.list { margin: 0; padding: 0; }

  ul.list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ul.list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  ul.list li:last-child { border-bottom: none; }
  ul.list a {
    color: var(--ink);
    text-decoration: none;
  }
  ul.list a:hover,
  ul.list a:focus-visible {
    color: var(--glow);
    text-decoration: underline;
  }
  #menu-soon li { color: var(--dim); }

  /* ---------- 8. frameset-track: single centered panel on white ---------- */
  .frameset-track {
    display: flex;
    justify-content: center;
  }

  main.center-frame {
    width: 100%;
    max-width: 640px;
    min-height: 100vh;
    background: var(--bg);
    border: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
  }

  /* ---------- 9. page strip -- now lives inside the frame, acting as
     its footer, instead of trailing below it on white. margin-top:auto
     (with center-frame as a flex column) is what pins it to the very
     bottom of the min-height:100vh frame -- without it, an empty or
     short frame body would leave the strip stranded right under the
     nav instead of at the bottom, with the frame's blank space
     trailing below it. ---------- */
  .page-strip {
    margin-top: auto;
    border-top: 1px solid var(--rule);
    padding: 16px 0 18px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: baseline;
    gap: 18px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .page-strip::-webkit-scrollbar { display: none; }
  /* Assumes exactly 3 stops (mesh / k-net / greens): first stop pinned
     toward the right edge of its column (so it sits close to center,
     not off at the far left), middle stop dead-center, third stop
     pinned toward the left edge of its column. If pages are added
     back later this grid needs revisiting. */
  .page-strip .stop:nth-child(1) { justify-self: end; }
  .page-strip .stop:nth-child(2) { justify-self: center; }
  .page-strip .stop:nth-child(3) { justify-self: start; }
  .page-strip .stop {
    font-size: 12px;
    color: var(--dim);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
  }
  .page-strip .stop.is-active {
    color: var(--glow);
    border-bottom-color: var(--glow);
  }
  .page-strip .stop.is-soon {
    color: #3a3f47;
  }

  @media (prefers-reduced-motion: reduce) {
    .flag::after, .cursor, .margin-banner img { animation: none; }
    .frameset-track { scroll-behavior: auto; }
  }
</style>
</head>

<script>
(function () {
  // ---- every page on the site, in the order they appear on the strip.
  // theme  = flag accent color for that page + strip highlight
  // live   = false means no click-through (arrows skip past it)
  // EDIT THIS ARRAY to add/remove/reorder pages -- everything below
  // (arrows, strip) is derived from it automatically.
  //
  // Every value below is sourced directly from this chat -- nothing
  // fabricated, nothing carried over from anywhere else.
  var PAGES = [
    { id: 'mesh',   name: 'meshTHATdivide', href: 'https://mtd.2203.fyi/', theme: '#c9812f', live: true },
    { id: 'knet',   name: 'k-NET',          href: 'https://86.2203.fyi/', theme: '#1c3fd9', live: true },
    { id: 'greens', name: 'Just Greens',    href: 'https://greens.2203.fyi/', theme: '#2f9e44', live: true }
  ];
  // Scrubber labels are never all-caps -- 'meshTHATdivide', 'k-NET',
  // and 'Just Greens' match their stylized display forms elsewhere on
  // the page (poster title, flag wordmark, margin-banner label). The
  // k-NET stop links to 86.2203.fyi, same destination as the flag
  // wordmark, even though it's also the current page.
  // Only the three relevant pages remain: comms hub and file drive were
  // dropped. Order is mesh / k-net / greens on purpose -- k-NET is the
  // page currently loaded, so it needs to land in the middle of the
  // strip, with Mesh That Divide flanking it on the left and Just
  // Greens on the right (see .page-strip's grid CSS, which assumes
  // exactly these three stops in this order).
  // 'mesh' theme (#c9812f, amber) pulled from the poster's own orange.

  var CURRENT_ID = 'knet';

  var idx = PAGES.findIndex(function (p) { return p.id === CURRENT_ID; });
  if (idx === -1) idx = 0;

  var flag = document.getElementById('flagFrame');
  if (flag) flag.style.setProperty('--flag-accent', PAGES[idx].theme);

  function wrap(i) { return (i + PAGES.length) % PAGES.length; }

  function nearestLive(fromIndex, dir) {
    for (var step = 1; step <= PAGES.length; step++) {
      var p = PAGES[wrap(fromIndex + dir * step)];
      if (p.live) return p;
    }
    return null;
  }

  var prevArrow = document.getElementById('prevArrow');
  var nextArrow = document.getElementById('nextArrow');
  var prevTarget = nearestLive(idx, -1);
  var nextTarget = nearestLive(idx, 1);

  if (prevTarget) prevArrow.addEventListener('click', function () { location.href = prevTarget.href; });
  else prevArrow.disabled = true;

  if (nextTarget) nextArrow.addEventListener('click', function () { location.href = nextTarget.href; });
  else nextArrow.disabled = true;

  var strip = document.getElementById('pageStrip');
  PAGES.forEach(function (p) {
    var el = document.createElement(p.live ? 'a' : 'span');
    el.className = 'stop' + (p.id === CURRENT_ID ? ' is-active' : '') + (p.live ? '' : ' is-soon');
    if (p.live) el.href = p.href;
    el.textContent = p.name;
    strip.appendChild(el);
  });
  var active = strip.querySelector('.is-active');
  if (active && strip.scrollWidth > strip.clientWidth) {
    active.scrollIntoView({ inline: 'center', block: 'nearest' });
  }

  // ---- left-margin side menus: TOOLS / SERVICE / SOON fly out a
  // panel instead of scrolling to an inline section. One open at a
  // time; clicking the currently-open button closes it.
  var menuButtons = document.querySelectorAll('.menu-toggle');
  menuButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var targetId = 'menu-' + btn.dataset.menu;
      var targetPanel = document.getElementById(targetId);
      var wasOpen = btn.classList.contains('is-active');

      menuButtons.forEach(function (b) { b.classList.remove('is-active'); });
      document.querySelectorAll('.side-menu').forEach(function (panel) {
        panel.hidden = true;
      });

      if (!wasOpen && targetPanel) {
        targetPanel.hidden = false;
        btn.classList.add('is-active');
      }
    });
  });
})();
</script>

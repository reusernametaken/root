<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=https://86.2203.fyi/">
<link rel="canonical" href="https://86.2203.fyi/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>2203.fyi</title>
<meta name="description" content="2203.fyi -- forwarding to k-NET.">

<!--
  ============================================================
  2203.fyi -- root domain forward
  This repo (root) is the bare 2203.fyi domain. It doesn't hold real
  content of its own -- it just forwards to 86.2203.fyi (k-NET), so
  visiting the root domain never leaves someone looking at a stale
  duplicate of a sibling page. Two redirect mechanisms, belt and
  suspenders: the <meta http-equiv="refresh"> above fires even with
  JS disabled, and location.replace() below fires instantly for
  everyone else -- replace() specifically so this page never lands in
  browser history (no back-button loop between here and 86.2203.fyi).
  The visible markup below is just the no-JS/slow-network fallback: a
  manual link, styled to match k-NET's own terminal aesthetic so nobody
  sees an unstyled flash even for the split second before the redirect
  fires.
  ============================================================
-->

<style>
  :root {
    --bg:   #050607;
    --ink:  #e8e8e8;
    --glow: #4fd1ff;
    --dim:  #6b7280;
    --mono: 'Courier New', ui-monospace, 'SFMono-Regular', Consolas, monospace;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .redirect {
    font-size: 14px;
    color: var(--dim);
    text-align: center;
  }
  .redirect span.prompt { color: var(--glow); }
  .redirect a {
    color: var(--glow);
    text-decoration: none;
  }
  .redirect a:hover,
  .redirect a:focus-visible {
    text-decoration: underline;
  }

  .cursor {
    display: inline-block;
    width: 0.5em;
    margin-left: 2px;
    background: var(--ink);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
  }
</style>
</head>

<body>
  <p class="redirect">
    <span class="prompt">$</span> forwarding to <a href="https://86.2203.fyi/">86.2203.fyi</a><span class="cursor">&nbsp;</span>
  </p>

  <script>
    location.replace('https://86.2203.fyi/');
  </script>
</body>
</html>
